name: Limite de propositions

on:
  issue_comment:
    types: [created]

jobs:
  check-limit:
    runs-on: ubuntu-latest
    if: contains(toJson(github.event.issue.labels), 'phase:propositions')
    steps:
      - name: Vérifier la limite de propositions
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo, number } = context.issue;
            const commenter = context.payload.comment.user.login;

            // Récupérer tous les commentaires de l'issue
            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number: number, per_page: 100 }
            );

            // Compter les commentaires non-masqués de cet·te utilisateur·ice
            // qui correspondent au format de proposition
            const proposalPattern = /^\*\*\[.+?\]\*\*/;
            const userProposals = comments.filter(c =>
              c.user.login === commenter &&
              !c.minimized &&
              proposalPattern.test(c.body || '')
            );

            if (userProposals.length > 3) {
              // Masquer le commentaire excédentaire via GraphQL
              await github.graphql(`
                mutation {
                  minimizeComment(input: {
                    subjectId: "${context.payload.comment.node_id}"
                    classifier: OFF_TOPIC
                  }) {
                    minimizedComment { isMinimized }
                  }
                }
              `);

              // Poster une notification
              await github.rest.issues.createComment({
                owner, repo, issue_number: number,
                body: `@${commenter} Merci pour ton enthousiasme ! Tu as atteint la limite de **3 propositions** par chapitre. Ta dernière proposition a été masquée. Tu peux supprimer une proposition existante pour en soumettre une nouvelle. 🙏`
              });
            }
