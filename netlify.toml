[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"
  # Les variables sont inlinées par Astro dans les bundles SSR (serveur uniquement, jamais côté client)
  SECRETS_SCAN_OMIT_KEYS = "GITHUB_REPO_OWNER,GITHUB_REPO_NAME,SITE_URL,GITHUB_CLIENT_ID"
  SECRETS_SCAN_OMIT_PATHS = ".netlify/build/chunks,.netlify/v1/functions,ADMIN.md,.env.example"
